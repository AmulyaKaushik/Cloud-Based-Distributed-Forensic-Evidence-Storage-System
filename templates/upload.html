<!DOCTYPE html>
<html>
<head>
    <title>Upload Evidence</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h2>Upload Evidence</h2>
    <p class="subtitle">Accepted: images, video, audio, PDF, documents</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        <label>Select File</label>
        <input type="file" name="file" required>
        <button type="submit">Upload &amp; Replicate</button>
    </form>

    <br>
    <a href="/dashboard"><button class="btn-secondary">Return to Dashboard</button></a>

</div>

</body>
</html>
