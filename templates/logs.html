<!DOCTYPE html>
<html>
<head>
    <title>Audit Logs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="dashboard">

    <div class="dashboard-header">
        <h2>Chain-of-Custody Audit Logs</h2>
        <a href="/dashboard"><button class="btn-secondary">Back to Dashboard</button></a>
    </div>

    <form method="GET" class="filter-bar">
        <input name="user" placeholder="Filter by user" value="{{ filter_user }}">
        <input name="action" placeholder="Filter by action (e.g. UPLOAD)" value="{{ filter_action }}">
        <button type="submit">Filter</button>
        <a href="/logs"><button type="button" class="btn-secondary">Clear</button></a>
    </form>

    <p class="subtitle">{{ logs|length }} record(s) found</p>

    {% if logs %}
        {% for log in logs %}
        <div class="log-entry">{{ log }}</div>
        {% endfor %}
    {% else %}
        <div class="alert alert-error">No log entries match the current filter.</div>
    {% endif %}

</div>

</body>
</html>
