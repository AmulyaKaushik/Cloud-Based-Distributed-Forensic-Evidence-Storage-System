<!DOCTYPE html>
<html>
<head>
    <title>Verify Evidence</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h2>Verify Evidence Integrity</h2>
    <p class="subtitle">Upload a file to compare its hash against the stored record</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if result == 'verified' %}
    <div class="alert alert-success">&#10003; {{ message }}</div>
    {% elif result == 'tampered' %}
    <div class="alert alert-error">&#9888; {{ message }}</div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        <label>Select File to Verify</label>
        <input type="file" name="file" required>
        <button type="submit">Verify Integrity</button>
    </form>

    <br>
    <a href="/dashboard"><button class="btn-secondary">Return to Dashboard</button></a>

</div>

</body>
</html>
