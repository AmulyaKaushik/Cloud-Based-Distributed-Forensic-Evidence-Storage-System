<!DOCTYPE html>
<html>
<head>
    <title>Register User</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h2>Register New User</h2>
    <p class="subtitle">Admin only — create accounts for authorised personnel.</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="POST">

        <label>Username</label>
        <input name="username" placeholder="Enter username" required>

        <label>Password</label>
        <input name="password" type="password" placeholder="Min 8 characters" required>

        <label>Confirm Password</label>
        <input name="confirm_password" type="password" placeholder="Repeat password" required>

        <label>Role</label>
        <select name="role" required>
            <option value="" disabled selected>-- Select Role --</option>
            {% for role in roles %}
            <option value="{{ role }}">{{ role.replace('_', ' ').title() }}</option>
            {% endfor %}
        </select>

        <button type="submit">Create Account</button>

    </form>

    <br>
    <a href="/dashboard"><button class="btn-secondary">Back to Dashboard</button></a>

</div>

</body>
</html>
